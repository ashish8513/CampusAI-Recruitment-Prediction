version: "3.9"

services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

  ml-service:
    build: ./services/ml-service
    ports: ["5001:5001"]
    volumes:
      - ./services/ml-service:/app
      - ./data:/data

  ai-service:
    build: ./services/ai-service
    ports: ["5002:5002"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./data/knowledge:/app/knowledge
      - ./services/ai-service:/app

  auth-service:
    build: ./services/auth-service
    ports: ["8081:8081"]

  api-gateway:
    build: ./services/api-gateway
    ports: ["4000:4000"]
    environment:
      - ML_SERVICE_URL=http://ml-service:5001
      - AI_SERVICE_URL=http://ai-service:5002
      - AUTH_SERVICE_URL=http://auth-service:8081
      - MONGODB_URI=mongodb://mongodb:27017/campus_ai
    depends_on: [mongodb, ml-service, ai-service, auth-service]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on: [api-gateway]

volumes:
  mongo_data:
